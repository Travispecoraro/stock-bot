# ============================================================
#  CONGRESS TRADE BOT — CONTROL PANEL  (managed file)
#  Edited via control-panel.html on 2026-07-19.
#  You can also edit by hand: true = on, false = off.
# ============================================================

features:
  ping_buys: true             # Alert on senator stock purchases
  ping_sells: true            # Alert on senator stock sales
  heartbeat: true             # Once-daily update on quiet days
  notify_on_error: true       # Message if a data source breaks
  senate_efd_source: true     # PRIMARY: official Senate eFD site
  capitoltrades_source: false # DORMANT: enable if their API recovers
  finnhub_enrichment: false   # Backup per-ticker checks (needs watchlist)

filters:
  min_trade_value: 0          # USD floor (low end of disclosed range)
  watch_tickers: []          # Empty = all tickers
  watch_politicians: []      # Empty = everyone
  lookback_days: 45           # Filing search window (days)

discord:
  user_id: "799000426623139850"
  mention_on_trade: true      # @you on trade alerts
  mention_on_heartbeat: false # @you on the daily update

heartbeat_hour_utc: 14        # Daily update hour (UTC)

max_filings_per_run: 25       # Senate filings parsed per check
seed_max_filings: 100         # Deep-seed depth on first run

pages_per_run: 3              # CapitolTrades pages per check (dormant)
seed_pages: 10                # CapitolTrades seed pages (dormant)

max_pings_per_run: 20         # Flood protection cap
