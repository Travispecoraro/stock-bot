name: Congress Trade Monitor

on:
  schedule:
    # Every 30 minutes. GitHub may delay scheduled runs by a few minutes
    # under load — fine for this use case, since disclosures are filed
    # days after the trade anyway.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write         # needed to commit state.json back to the repo

concurrency:
  group: monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python monitor.py

      - name: Commit state
        run: |
          git config user.name "congress-trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
