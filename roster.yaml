# ============================================================
#  CURATED ROSTER — the watchlist that gates the whole bot
# ------------------------------------------------------------
#  The bot reports ONLY trades/holdings from entities listed here.
#  Everything outside the roster is ignored at the source. Edit +
#  push to GitHub = applied next run. No redeploy.
#
#  groups:  master on/off per source type.
#  cik:     SEC filer ID — an EXACT match, no name-fuzzing. Leave it
#           blank and the bot resolves it against EDGAR on the next
#           run, caching to roster_resolved.json. IMPORTANT: the first
#           run prints each resolution, e.g.
#             roster: resolved 'Citadel Advisors' -> CIK 1423053 (CITADEL ADVISORS LLC)
#           Skim that log once and confirm each fund matched the
#           manager you meant — a couple of common names can resolve
#           to the wrong filer, and a wrong CIK silently tracks the
#           wrong fund. Pre-fill the cik for any you want to pin.
# ============================================================

groups:
  funds: true          # 13F quarterly holdings — the "smart money" core
  activists: true      # SC 13D / 13G  (5%+ stakes)
  politicians: true    # congressional disclosures
  insiders: true       # corporate insider Form 4s

# ── FUNDS & INVESTORS ──────────────────────────────────────────
#  Managers who file quarterly 13Fs. Comment after each is the
#  person most associated with the fund. The three with CIKs are
#  verified; the rest auto-resolve on first run (check the log).
funds:
  - name: Berkshire Hathaway                  # Warren Buffett
    cik: "1067983"
    tags: [buffett, value]
